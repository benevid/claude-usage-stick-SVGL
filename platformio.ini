; LilyGo T-Display S3 AMOLED (1.91" RM67162, e.g. H712/H713/H705/H681/H717 variants)
; Display is auto-detected at runtime by the LilyGo_AMOLED library.
[env:tdisplay-s3-amoled]
platform = espressif32@6.12.0
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = spiffs
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

lib_deps =
    https://github.com/Xinyuan-LilyGO/LilyGo-AMOLED-Series.git
    bodmer/TFT_eSPI@^2.5.31
    bblanchon/ArduinoJson@^7.0.0
    lewisxhe/XPowersLib@^0.2.7
    lewisxhe/SensorLib@^0.2.4

build_flags =
    -DBOARD_TDISPLAY_S3_AMOLED
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -DLILYGO_TDISPLAY_AMOLED_SERIES
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -DCORE_DEBUG_LEVEL=1

; LilyGo T8 ESP32-S2 (1.14" ST7789 135x240 LCD, same panel as the TTGO T-Display).
; No dedicated PlatformIO board def exists — esp32-s2-saola-1 is the generic S2 base.
; USB is a CH340C UART bridge (not native USB CDC), so ARDUINO_USB_CDC_ON_BOOT is left unset.
; Display wiring uses the broken-out FSPI pins (GPIO33-38); CS/MOSI/SCLK/RST are from the
; schematic, DC=37/BL=33 are the two remaining FSPI pins — all verified on hardware.
[env:t8-s2]
platform = espressif32@6.9.0
board = esp32-s2-saola-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.filesystem = spiffs
board_build.partitions = default.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DBOARD_T8_S2
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=135
    -DTFT_HEIGHT=240
    -DTFT_MOSI=35
    -DTFT_SCLK=36
    -DTFT_CS=34
    -DTFT_DC=37
    -DTFT_RST=38
    -DTFT_BL=33
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=40000000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_GFXFF
    -DCORE_DEBUG_LEVEL=1

; Elecrow CrowPanel Advance 3.5" HMI (ESP32-S3-WROOM-1 N16R8, 480x320 IPS).
; Display is an ILI9488 over SPI; capacitive touch is a GT911 on I2C (SDA=15, SCL=16).
; No dedicated PlatformIO board def — esp32-s3-devkitc-1 is the generic S3 base.
; USB is a CH340K UART bridge (not native USB CDC), so ARDUINO_USB_CDC_ON_BOOT is unset.
; Pins are from Elecrow's official LovyanGFX driver (verified on hardware).
[env:crowpanel-adv-35]
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.filesystem = spiffs
board_build.partitions = default.csv
board_build.arduino.memory_type = qio_opi   ; N16R8 module: QIO flash + OPI PSRAM (for the dashboard framebuffer)

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/TAMCTec/gt911-arduino.git

build_flags =
    -DBOARD_CROWPANEL_ADV_35
    -DBOARD_HAS_PSRAM
    -DUSER_SETUP_LOADED
    -DUSE_HSPI_PORT
    -DILI9488_DRIVER
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MISO=-1
    -DTFT_MOSI=39
    -DTFT_SCLK=42
    -DTFT_CS=40
    -DTFT_DC=41
    -DTFT_RST=2
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=16000000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_GFXFF
    -DCORE_DEBUG_LEVEL=1
